apiVersion: apps/v1
kind: Deployment
metadata:
  name: genai-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: genai-service
  template:
    metadata:
      labels:
        app: genai-service
    spec:
      containers:
        - name: genai-service
          image: springcommunity/spring-animalclinic-genai-service:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: animalclinic-common-env
          env:
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: genai-secrets
                  key: OPENAI_API_KEY
                  optional: true
            - name: AZURE_OPENAI_KEY
              valueFrom:
                secretKeyRef:
                  name: genai-secrets
                  key: AZURE_OPENAI_KEY
                  optional: true
            - name: AZURE_OPENAI_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: genai-secrets
                  key: AZURE_OPENAI_ENDPOINT
                  optional: true
          ports:
            - containerPort: 8084
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8084
            initialDelaySeconds: 45
            periodSeconds: 10
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8084
            initialDelaySeconds: 90
            periodSeconds: 20
            failureThreshold: 6
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 512Mi
